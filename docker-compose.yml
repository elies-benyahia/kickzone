version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: kickzone_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
      interval: 5s
    networks:
      - app_net

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kickzone_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:     db
      DB_PORT:     3306
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME:     ${DB_NAME}
      JWT_SECRET:         ${JWT_SECRET}
      JWT_EXPIRES_IN:     ${JWT_EXPIRES_IN}
      PORT:               3001
      NODE_ENV:           production
      ALLOWED_ORIGINS:    ${ALLOWED_ORIGINS}
      FOOTBALL_API_KEY:   ${FOOTBALL_API_KEY}
      ADMIN_EMAIL:        ${ADMIN_EMAIL}
      ADMIN_PASSWORD:     ${ADMIN_PASSWORD}
    expose:
      - "3001"
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    container_name: kickzone_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./client/dist:/usr/share/nginx/html:ro
    networks:
      - app_net

volumes:
  db_data:

networks:
  app_net:
    driver: bridge
